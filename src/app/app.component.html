@let theme = theme$ | async;

<div [class]="theme ?? ''">
  <!-- loading spinner -->
  @if (loading$ | async) {
    <div class="loading-container flex-content-center">
      <mat-progress-spinner color="primary" mode="indeterminate" />
    </div>
  }
  <app-header />
  <app-sidebar />
  <div id="main" class="main-container main">
    <router-outlet (activate)="componentActive($event)" />
  </div>
  <app-footer />
</div>
