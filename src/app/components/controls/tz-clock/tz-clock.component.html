@if (zone().title) {
  <div class="card">
    <div class="card-body">
      <h4 class="card-title">{{zone().title}}</h4>
      <p class="card-text">
        {{dt() | date : 'mediumDate' : tzOffset }}
      </p>
      <p class="card-text">
        {{dt() | date: 'mediumTime' : tzOffset}}
      </p>
    </div>
  </div>
}
