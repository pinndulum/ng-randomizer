<div class="pagetitle">
  <nav>
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a routerLink="/">Home</a></li>
      <li class="breadcrumb-item">Random</li>
      <li class="breadcrumb-item">Object</li>
      <li class="breadcrumb-item active">Mock DSL</li>
    </ol>
  </nav>
  <h1>Custom Mock Object</h1>
</div>
<section class="section obj-mock-dsl">
  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-body pt-3">
          <h5 class="card-title fs-6">
            Mock DSL Object
          </h5>
          @if (editobj.error) {
            <div class="alert alert-danger py-2">
              {{editobj.error}}
            </div>
          }
          <app-json-editor [data]="editobj.data" (dataChange)="templateChanged($event)"
            (errorChange)="templateErrorChanged($event)" />
        </div>
      </div>
    </div>
    <div class="col-xl-6">
      <div class="card">
        <div class="card-body pt-3">
          <h5 class="card-title fs-6">
            Mock Result
          </h5>
          <div class="row pb-3">
            <div class="col">
              <button class="btn btn-primary" type="button" (click)="mockdata()" [disabled]="!!editobj.error">
                New Result
              </button>
            </div>
            @if (editobj.mock) {
              <div class="col">
                <button class="btn btn-primary" type="button" [cdkCopyToClipboard]="editobj.mock | json">
                  Copy to clipboard
                </button>
              </div>
            }
          </div>
          @if (editobj.mock) {
            <div class="row">
              <textarea rows="30">{{editobj.mock | json}}</textarea>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
