<aside id="sidebar" class="sidebar">
    <ul class="sidebar-nav" id="sidebar-nav">
        @for (item of navItems; track item.routerLink) {
        <li class="nav-item">
            <a class="nav-link" [routerLink]="item.routerLink">
                <i [class]="item.iconClass"></i>
                <span>{{item.label}}</span>
            </a>
        </li>
        }
    </ul>
</aside>
